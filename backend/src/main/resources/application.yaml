spring:
  application:
    name: e-commerce

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      timeout: 2s
      repositories:
        enabled: false

  cache:
    type: redis
    cache-names:
      - product-details
      - brands
      - categories
    redis:
      cache-null-values: false

app:
  cache:
    key-prefix: "ecommerce:${APP_ENV:dev}:v2:cache:"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  signerKey: ${JWT_SIGNER_KEY}
