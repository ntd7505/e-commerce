spring:
  application:
    name: e-commerce

  # Loads local development secrets from the ignored .env file when present.
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:1}
      timeout: 2s
      repositories:
        enabled: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  cache:
    type: redis
    cache-names:
      - product-details
      - brands
      - categories
    redis:
      cache-null-values: false

app:
  cache:
    key-prefix: "ecommerce:${APP_ENV:dev}:v2:cache:"
  mail:
    from: ${MAIL_FROM:${MAIL_USERNAME}}
    password-reset-code-expiry-minutes: 10
    password-reset-max-attempts: 5
    password-reset-resend-cooldown-seconds: 60
    password-reset-max-requests: 3
    password-reset-request-window-minutes: 15

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  signerKey: ${JWT_SIGNER_KEY}

payment:
  vietqr:
    bank-code: ${PAYMENT_BANK_CODE:VPB}
    bank-account: ${PAYMENT_BANK_ACCOUNT:0987654321}
    bank-account-name: ${PAYMENT_BANK_ACCOUNT_NAME:NGUYEN VAN A}
    qr-template: ${PAYMENT_QR_TEMPLATE:compact}
